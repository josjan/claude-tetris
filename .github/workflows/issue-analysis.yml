name: Issue Analysis

on:
  issues:
    types: [opened, edited]

jobs:
  analyze:
    if: github.actor != 'claude[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Analyze issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Analyze GitHub issue #${{ github.event.issue.number }} in repository ${{ github.repository }}.

            Follow these steps in order:

            1. Read the full issue content:
               gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title,body,labels

            2. Read the project context to understand the codebase:
               cat CLAUDE.md

            3. Determine which labels apply from ONLY this list (use the exact names):
               - bug          → incorrect game behavior, something is broken
               - enhancement  → new feature request or improvement
               - ui           → visual changes, CSS, canvas rendering, layout
               - gameplay     → game mechanics: rotation, scoring, speed, collision
               - performance  → game loop or rendering optimization
               - documentation → CLAUDE.md or code documentation improvements
               - question     → needs clarification before acting

            4. Ensure each chosen label exists in the repo and then apply them.
               Use these exact colors when creating labels:
               - bug: d73a4a
               - enhancement: a2eeef
               - ui: 7057ff
               - gameplay: 0e8a16
               - performance: e4e669
               - documentation: 0075ca
               - question: d876e3

               Commands:
               gh label create "LABEL_NAME" --color "HEX_COLOR" --description "DESCRIPTION" --repo ${{ github.repository }} --force
               gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label "label1,label2"

            5. Post a diagnostic comment in Spanish using this exact structure:

               gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "COMMENT_BODY"

               The comment body must be valid GitHub Flavored Markdown (GFM): use ## for headings,
               **text** for bold, - for bullet lists, and `code` for inline code. Do not use
               HTML tags or any syntax that GitHub does not render in issue comments.

               The comment must follow this template (fill in each section based on your analysis):

               ## Análisis del Issue — Claude

               **Categoría**: [type: Bug / Mejora / UI / Gameplay / Performance / Documentación / Consulta]
               **Componentes afectados**: [list the relevant files and specific functions, e.g. game.js → tryRotate(), collide()]

               ### Diagnóstico
               [2-4 sentences: technical description of the problem based on the project architecture described in CLAUDE.md]

               ### Áreas de código a investigar
               [List specific functions from game.js or other files that are relevant, with a brief note on their role]

               ### Enfoque sugerido
               [1-3 concrete, actionable ideas to approach the solution]

               ---
               *Labels asignados: [comma-separated list of applied labels]*
               *Análisis generado automáticamente por Claude*
